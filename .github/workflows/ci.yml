# Build status badge:
# ![CI](https://github.com/<OWNER>/<REPO>/actions/workflows/ci.yml/badge.svg)
# Replace <OWNER>/<REPO> with your GitHub repository path, e.g.:
# ![CI](https://github.com/sheyy/my_zig_agent/actions/workflows/ci.yml/badge.svg)

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  ZIG_VERSION: 0.14.0

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v1
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Cache Zig dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/zig
            .zig-cache
          key: ${{ runner.os }}-zig-${{ hashFiles('build.zig.zon') }}
          restore-keys: |
            ${{ runner.os }}-zig-

      - name: Check formatting
        run: zig fmt --check src/

      - name: Run tests
        run: zig build test

      - name: Build release binary
        run: zig build -Doptimize=ReleaseFast

      - name: Set artifact metadata
        id: meta
        run: |
          echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: my_zig_agent-${{ steps.meta.outputs.date }}-${{ steps.meta.outputs.short_sha }}
          path: zig-out/bin/my_zig_agent
          retention-days: 7
