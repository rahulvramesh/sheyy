# Build status badge:
# ![CI](https://github.com/rahulvramesh/sheyy/actions/workflows/ci.yml/badge.svg)

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  ZIG_VERSION: "0.15.2"

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Zig
        run: |
          wget -q "https://ziglang.org/builds/zig-linux-x86_64-${ZIG_VERSION}.tar.xz"
          tar -xf "zig-linux-x86_64-${ZIG_VERSION}.tar.xz"
          echo "$PWD/zig-linux-x86_64-${ZIG_VERSION}" >> "$GITHUB_PATH"

      - name: Verify Zig
        run: zig version

      - name: Check formatting
        run: zig fmt --check src/

      - name: Run tests
        run: zig build test

      - name: Build release binary
        run: zig build -Doptimize=ReleaseFast

      - name: Set artifact metadata
        id: meta
        run: |
          echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sheyybot-${{ steps.meta.outputs.date }}-${{ steps.meta.outputs.short_sha }}
          path: zig-out/bin/my_zig_agent
          retention-days: 7
