name: Release

on:
  push:
    tags:
      - 'v*'

env:
  ZIG_VERSION: "0.15.2"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Zig
        run: |
          wget -q "https://ziglang.org/builds/zig-linux-x86_64-${ZIG_VERSION}.tar.xz"
          tar -xf "zig-linux-x86_64-${ZIG_VERSION}.tar.xz"
          echo "$PWD/zig-linux-x86_64-${ZIG_VERSION}" >> "$GITHUB_PATH"

      - name: Build release binary
        run: zig build -Doptimize=ReleaseFast

      - name: Create tarball
        run: |
          tar -czf sheyybot-${{ github.ref_name }}-linux-x86_64.tar.gz -C zig-out/bin my_zig_agent

      - name: Generate checksum
        run: |
          sha256sum sheyybot-${{ github.ref_name }}-linux-x86_64.tar.gz > sheyybot-${{ github.ref_name }}-linux-x86_64.tar.gz.sha256

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            sheyybot-${{ github.ref_name }}-linux-x86_64.tar.gz
            sheyybot-${{ github.ref_name }}-linux-x86_64.tar.gz.sha256
          generate_release_notes: true
